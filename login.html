<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 上下五千年</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.js">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Serif SC', serif;
    background: linear-gradient(135deg, #fdf6ec 0%, #f5e6d0 50%, #e8d5b7 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(139, 69, 19, 0.15);
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .card h1 {
    font-size: 28px;
    color: #8B4513;
    margin-bottom: 6px;
    font-family: 'Noto Serif SC', 'STSong', serif;
  }
  .card .subtitle {
    color: #999;
    font-size: 13px;
    margin-bottom: 28px;
  }
  .form-group {
    margin-bottom: 18px;
    text-align: left;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-group input {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid #e8d5b7;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-group input:focus {
    border-color: #C0392B;
  }
  .btn {
    width: 100%;
    padding: 12px;
    background: #C0392B;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    color: #e74c3c;
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
  }
  .footer {
    margin-top: 20px;
    font-size: 13px;
    color: #999;
  }
  .footer a {
    color: #C0392B;
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }
  .back-link {
    display: inline-block;
    margin-top: 16px;
    font-size: 13px;
    color: #999;
    text-decoration: none;
  }
  .back-link:hover { color: #C0392B; }
</style>
</head>
<body>
<div class="card">
  <h1>登录</h1>
  <p class="subtitle">上下五千年 · 历史故事</p>

  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
  <div class="error" id="errorMsg"></div>

  <div class="footer">
    还没有账号？<a href="register.html">立即注册</a>
  </div>
  <a href="index.html" class="back-link">← 返回首页</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.js"></script>
<script src="auth.js"></script>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.textContent = '登录中...';
  errEl.textContent = '';

  const result = await loginUser(username, password);

  if (result.success) {
    errEl.style.color = '#27ae60';
    errEl.textContent = '登录成功，跳转中...';
    // 跳转到来源页面或首页
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    setTimeout(() => {
      window.location.href = redirect || 'index.html';
    }, 500);
  } else {
    errEl.style.color = '#e74c3c';
    errEl.textContent = result.error;
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}

// 回车登录
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

// 如果已登录，直接跳转
checkLoginStatus().then(status => {
  if (status.loggedIn) {
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    window.location.href = redirect || 'index.html';
  }
});
</script>
</body>
</html>
